<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 中间透明(无底色, 显示页面/浏览器背景) -->
  <!-- 线条加粗: 浏览器 tab 尺寸很小, 需要更粗才能看清 -->
  <!-- 左方括号 -->
  <path d="M10 4 L4 4 L4 28 L10 28" stroke="#3B82F6" stroke-width="3" stroke-linejoin="miter"/>
  <!-- 右方括号 -->
  <path d="M22 4 L28 4 L28 28 L22 28" stroke="#3B82F6" stroke-width="3" stroke-linejoin="miter"/>
  <!-- K 线 wick(上下影) -->
  <line x1="16" y1="7" x2="16" y2="25" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- K 线 body -->
  <rect x="12.5" y="9" width="7" height="10" fill="#3B82F6" rx="0.5"/>
</svg>
